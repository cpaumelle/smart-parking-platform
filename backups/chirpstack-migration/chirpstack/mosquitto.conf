# Mosquitto MQTT Broker Configuration
# Version: 1.0.0
# Timestamp: 2025-10-01
# VM: 110 (chirpstack-sensemy)

# Listen on default MQTT port
listener 1883
protocol mqtt

# WebSocket listener
listener 9001
protocol websockets

# Allow anonymous connections (secure in production with auth)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
